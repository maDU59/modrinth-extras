name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm lint

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm zip && pnpm zip:firefox

      - uses: actions/upload-artifact@v4
        with:
          name: zips
          path: .output/*.zip
          if-no-files-found: error
          include-hidden-files: true

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: zips
          path: zips/

      - uses: softprops/action-gh-release@v2
        with:
          files: zips/*.zip
          draft: true

  publish-chrome:
    name: Publish to Chrome Web Store
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: zips
          path: zips/

      - name: Find Chrome zip
        id: zip
        run: echo "path=$(ls zips/*.zip | grep -v firefox | grep -v sources | head -1)" >> $GITHUB_OUTPUT

      - uses: wdzeng/chrome-extension@v1.3.0
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          zip-path: ${{ steps.zip.outputs.path }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

  publish-firefox:
    name: Publish to Firefox Add-Ons
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: zips
          path: zips/

      - uses: wdzeng/firefox-addon@v1.2.0
        with:
          addon-guid: contact@creeperkatze.de
          xpi-path: zips/*firefox*.zip
          source-file-path: zips/*sources*.zip
          license: AGPL-3.0-only
          jwt-issuer: ${{ secrets.FIREFOX_JWT_ISSUER }}
          jwt-secret: ${{ secrets.FIREFOX_JWT_SECRET }}

  publish-edge:
    name: Publish to Edge Add-ons
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: zips
          path: zips/

      - name: Find Chrome zip (used for Edge)
        id: zip
        run: echo "path=$(ls zips/*.zip | grep -v firefox | grep -v sources | head -1)" >> $GITHUB_OUTPUT

      - uses: wdzeng/edge-addon@v2.1.0
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: ${{ steps.zip.outputs.path }}
          api-key: ${{ secrets.EDGE_API_KEY }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}