name: 💡 Feature request
description: Suggest a feature you would like to see in the extension
labels: ['enhancement']
body:
  - type: textarea
    attributes:
      label: Describe the feature
      description: A clear and concise description of the feature you would like to see. Include screenshots or mockups if applicable.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Why would this be useful?
      description: What problem does this solve, or what use case does it address?
    validations:
      required: false